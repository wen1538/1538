<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>.1538 | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@300&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --text: #f4f4f4; --neon: rgba(255, 255, 255, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none !important; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* Effets Visuels */
        .film-grain { position: fixed; inset: 0; background-image: url("https://upload.wikimedia.org/wikipedia/commons/7/76/1k_Grain_Overlay.png"); opacity: 0.04; pointer-events: none; z-index: 9999; }
        .cursor-x { position: fixed; width: 14px; height: 14px; pointer-events: none; z-index: 100000; transform: translate(-50%, -50%); mix-blend-mode: difference; }
        .cursor-x::before, .cursor-x::after { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1.2px; background: #fff; box-shadow: 0 0 8px var(--neon); }
        .cursor-x::before { transform: rotate(45deg); } .cursor-x::after { transform: rotate(-45deg); }
        .cursor-x.active { transform: translate(-50%, -50%) scale(2) rotate(90deg); transition: 0.2s; }

        /* Navigation */
        header { position: fixed; top: 30px; left: 40px; z-index: 1000; }
        .logo-img { height: 50px; filter: invert(1); transition: 0.3s; }
        nav { position: fixed; top: 110px; left: 40px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; }
        .nav-link { background: none; border: none; color: rgba(255,255,255,0.2); font-family: inherit; font-size: 10px; letter-spacing: 3px; text-transform: uppercase; text-align: left; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff; transform: translateX(5px); }

        /* Grille Responsive */
        .gallery-container { padding: 80px 40px 80px 240px; min-height: 100vh; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 30px; }
        
        .photo-card { grid-column: span 4; opacity: 0; transform: translateY(20px); transition: 1s cubic-bezier(0.19, 1, 0.22, 1); }
        .photo-card.visible { opacity: 1; transform: translateY(0); }
        .photo-card.featured { grid-column: span 8; }

        .img-box { width: 100%; aspect-ratio: 4/5; overflow: hidden; background: #050505; margin-bottom: 15px; }
        .photo-card.featured .img-box { aspect-ratio: 16/8; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 1.5s ease; }
        .photo-card:hover img { filter: grayscale(0); transform: scale(1.05); }

        .meta { display: flex; justify-content: space-between; font-size: 8px; letter-spacing: 2px; color: rgba(255,255,255,0.3); text-transform: uppercase; }
        .meta h3 { font-family: 'Playfair Display', serif; font-size: 14px; color: #fff; text-transform: none; font-style: italic; }

        /* Viewer */
        .viewer { position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; display: none; opacity: 0; transition: 0.5s; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .viewer.show { display: flex; opacity: 1; }
        .viewer img { max-width: 85%; max-height: 80%; object-fit: contain; }
        .viewer-close { position: absolute; top: 30px; right: 40px; background: none; border: none; }
        .viewer-close img { width: 45px; filter: invert(1); opacity: 0.5; }

        /* Mobile Fix */
        @media (max-width: 1024px) {
            .gallery-container { padding: 180px 25px 50px; }
            nav { top: 100px; left: 25px; flex-direction: row; flex-wrap: wrap; }
            .photo-card, .photo-card.featured { grid-column: span 12; }
            #cursor-x { display: none; } * { cursor: auto !important; }
        }
    </style>
</head>
<body>

    <div class="film-grain"></div>
    <div id="cursor-x" class="cursor-x"></div>

    <header>
        <img src="https://i.imgur.com/ELW5rnM.png" class="logo-img" alt=".1538">
    </header>

    <nav id="rubriques">
        <button class="nav-link active" data-filter="tout">Journal</button>
        <button class="nav-link" data-filter="Nantes">Nantes</button>
        <button class="nav-link" data-filter="Rennes">Rennes</button>
        <button class="nav-link" data-filter="Projets">Projets</button>
    </nav>

    <main class="gallery-container">
        <div class="grid" id="gallery"></div>
    </main>

    <div class="viewer" id="viewer" onclick="closeV()">
        <button class="viewer-close"><img src="boit.png"></button>
        <img id="v-img" src="">
    </div>

    <script>
        let db = [];
        const gallery = document.getElementById('gallery');
        const cursor = document.getElementById('cursor-x');

        async function init() {
            try {
                const res = await fetch('images.json');
                db = await res.json();
                render(db);
            } catch (e) { console.error("Erreur JSON"); }
        }

        function render(data) {
            gallery.innerHTML = data.map((img, i) => `
                <div class="photo-card ${img.featured ? 'featured' : ''}" onclick="openV('${img.url}')">
                    <div class="img-box"><img src="${img.url}" loading="lazy"></div>
                    <div class="meta">
                        <h3>${img.titre}</h3>
                        <span>${img.lieu}</span>
                    </div>
                </div>
            `).join('');
            setTimeout(() => document.querySelectorAll('.photo-card').forEach(c => c.classList.add('visible')), 100);
        }

        document.getElementById('rubriques').addEventListener('click', e => {
            if(!e.target.classList.contains('nav-link')) return;
            document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
            e.target.classList.add('active');
            const f = e.target.dataset.filter;
            render(f === 'tout' ? db : db.filter(i => i.rubrique === f));
        });

        function openV(url) {
            document.getElementById('v-img').src = url;
            document.getElementById('viewer').style.display = 'flex';
            setTimeout(() => document.getElementById('viewer').classList.add('show'), 10);
        }

        function closeV() {
            document.getElementById('viewer').classList.remove('show');
            setTimeout(() => document.getElementById('viewer').style.display = 'none', 500);
        }

        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        init();
    </script>
</body>
</html>
